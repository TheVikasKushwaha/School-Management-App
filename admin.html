<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - College Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 0;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .sidebar-menu {
            padding: 1.5rem 0;
        }

        .menu-item {
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: rgba(255, 255, 255, 0.7);
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .menu-item.active {
            background: rgba(102, 102, 241, 0.2);
            border-left-color: #667eea;
            color: #a5b4fc;
        }

        .menu-item i {
            font-size: 1.2rem;
            width: 24px;
        }

        .logout-btn {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            min-height: 100vh;
        }

        .page-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 102, 241, 0.5);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        /* Section */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Action Button */
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 102, 241, 0.4);
        }

        /* Table */
        .data-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table th {
            background: rgba(102, 102, 241, 0.1);
            color: #a5b4fc;
            font-weight: 600;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Grid Layout for Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 102, 241, 0.5);
        }

        .item-card h3 {
            color: #a5b4fc;
            margin-bottom: 0.5rem;
        }

        .item-card p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: rgba(30, 27, 75, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: #a5b4fc;
        }

        .close-modal {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 102, 241, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-graduation-cap"></i> Admin Panel</h2>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="showSection('dashboard', this)">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </div>
            <div class="menu-item" onclick="showSection('events', this)">
                <i class="fas fa-calendar"></i>
                <span>Events</span>
            </div>
            <div class="menu-item" onclick="showSection('notices', this)">
                <i class="fas fa-bell"></i>
                <span>Notices</span>
            </div>
            <div class="menu-item" onclick="showSection('gallery', this)">
                <i class="fas fa-images"></i>
                <span>Gallery</span>
            </div>
            <div class="menu-item" onclick="showSection('teachers', this)">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Teachers</span>
            </div>
            <div class="menu-item" onclick="showSection('contacts', this)">
                <i class="fas fa-envelope"></i>
                <span>Messages</span>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            Logout
        </button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Dashboard Section -->
        <div id="dashboard" class="section active">
            <h1 class="page-title">Dashboard Overview</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="stat-value" id="statsEvents">0</div>
                    </div>
                    <div class="stat-label">Total Events</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <i class="fas fa-bell"></i>
                        </div>
                        <div class="stat-value" id="statsNotices">0</div>
                    </div>
                    <div class="stat-label">Total Notices</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <i class="fas fa-images"></i>
                        </div>
                        <div class="stat-value" id="statsGallery">0</div>
                    </div>
                    <div class="stat-label">Gallery Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                        <div class="stat-value" id="statsTeachers">0</div>
                    </div>
                    <div class="stat-label">Total Teachers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="stat-value" id="statsContacts">0</div>
                    </div>
                    <div class="stat-label">Contact Messages</div>
                </div>
            </div>
        </div>

        <!-- Events Section -->
        <div id="events" class="section">
            <h1 class="page-title">Events Management</h1>
            <button class="btn-add" onclick="openModal('event')">
                <i class="fas fa-plus"></i> Add Event
            </button>
            <div id="eventsContainer" class="cards-grid">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Notices Section -->
        <div id="notices" class="section">
            <h1 class="page-title">Notices Management</h1>
            <button class="btn-add" onclick="openModal('notice')">
                <i class="fas fa-plus"></i> Add Notice
            </button>
            <div id="noticesContainer" class="cards-grid">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Gallery Section -->
        <div id="gallery" class="section">
            <h1 class="page-title">Gallery Management</h1>
            <button class="btn-add" onclick="openModal('gallery')">
                <i class="fas fa-plus"></i> Add Image
            </button>
            <div id="galleryContainer" class="gallery-grid">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Teachers Section -->
        <div id="teachers" class="section">
            <h1 class="page-title">Teachers Management</h1>
            <button class="btn-add" onclick="openModal('teacher')">
                <i class="fas fa-plus"></i> Add Teacher
            </button>
            <div id="teachersContainer" class="cards-grid">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Contacts Section -->
        <div id="contacts" class="section">
            <h1 class="page-title">Contact Messages</h1>
            <div id="contactsContainer" class="data-table">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Universal Modal -->
    <div class="modal" id="universalModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Item</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="universalForm">
                <div id="formFields"></div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-save"></i> Save
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let currentSection = 'dashboard';
        let currentModal = null;
        let editId = null;

        // Check auth on load
        window.onload = function () {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadAllData();
        };

        // Show toast
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Fetch with auth
        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('authToken');
            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...options,
                    headers: {
                        ...options.headers,
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) {
                    showToast('Session expired. Please login again.', true);
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    return null;
                }

                return response;
            } catch (error) {
                console.error('Fetch error:', error);
                showToast('Network error', true);
                return null;
            }
        }

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadEvents(),
                loadNotices(),
                loadGallery(),
                loadTeachers(),
                loadContacts()
            ]);
            updateStats();
        }

        // Update stats
        function updateStats() {
            document.getElementById('statsEvents').textContent = document.querySelectorAll('#eventsContainer .item-card').length;
            document.getElementById('statsNotices').textContent = document.querySelectorAll('#noticesContainer .item-card').length;
            document.getElementById('statsGallery').textContent = document.querySelectorAll('#galleryContainer .gallery-item').length;
            document.getElementById('statsTeachers').textContent = document.querySelectorAll('#teachersContainer .item-card').length;
            document.getElementById('statsContacts').textContent = document.querySelectorAll('#contactsContainer tbody tr').length;
        }

        // Load Events
        async function loadEvents() {
            const response = await fetchWithAuth('/api/events');
            if (!response) return;

            const result = await response.json();
            const events = result.data || [];

            const container = document.getElementById('eventsContainer');

            if (events.length === 0) {
                container.innerHTML =
                    '<p style="color: rgba(255,255,255,0.5); text-align:center;">No events found</p>';
                return;
            }

            container.innerHTML = events.map(event => `
        <div class="item-card">
            <h3>${event.title}</h3>
            <p>${event.shortDescription}</p>
            <p><i class="fas fa-calendar"></i> ${new Date(event.date).toLocaleDateString()}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${event.location}</p>

            <div class="card-actions">
                <button class="btn-delete"
                    onclick="deleteItem('event', '${event._id}')">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    `).join('');
        }


        // Load Notices
        async function loadNotices() {
            const response = await fetchWithAuth('/api/notice');
            if (!response) return;

            const result = await response.json();
            const notices = result.data || [];

            const container = document.getElementById('noticesContainer');

            if (notices.length === 0) {
                container.innerHTML =
                    '<p style="color: rgba(255,255,255,0.5); text-align:center;">No notices found</p>';
                return;
            }

            container.innerHTML = notices.map(notice => `
      <div class="item-card">
    <h3>${notice.title}</h3>
    <p>${notice.description}</p>
    <p style="font-size: 0.85rem; opacity: 0.7;">
        ${notice.category} • ${new Date(notice.date).toLocaleDateString()}
    </p>

    <div class="card-actions">
        <button class="btn-delete"
            onclick="deleteItem('notice', '${notice._id}')">
            <i class="fas fa-trash"></i> Delete
        </button>
    </div>
</div>
    `).join('');
        }


        // Load Gallery
        async function loadGallery() {
            const response = await fetchWithAuth('/api/gallery');
            if (!response) return;

            const result = await response.json();
            const images = result.data || [];

            const container = document.getElementById('galleryContainer');

            if (images.length === 0) {
                container.innerHTML =
                    '<p style="color: rgba(255,255,255,0.5); text-align:center;">No images found</p>';
                return;
            }

            container.innerHTML = images.map(img => `
        <div class="gallery-item">
            <img src="${img.imageUrl}" alt="${img.title}">
            <div class="gallery-overlay">
                <button class="btn-delete"
                    onclick="deleteItem('gallery', '${img._id}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    `).join('');
        }

        // Load Teachers
        async function loadTeachers() {
            const response = await fetchWithAuth('/api/teacher');
            if (!response) return;

            const result = await response.json();
            const teachers = result.data || [];

            const container = document.getElementById('teachersContainer');

            if (teachers.length === 0) {
                container.innerHTML =
                    '<p style="color: rgba(255,255,255,0.5); text-align:center;">No teachers found</p>';
                return;
            }

            container.innerHTML = teachers.map(teacher => `
        <div class="item-card">
            <h3>${teacher.name}</h3>
            <p>${teacher.subject || 'N/A'}</p>
            <p style="font-size: 0.85rem;">${teacher.email || ''}</p>

            <div class="card-actions">
                <button class="btn-delete"
                    onclick="deleteItem('teacher', '${teacher._id}')">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    `).join('');
        }

        // Load Contacts
        async function loadContacts() {
            const response = await fetchWithAuth("/api/contact");
            if (!response) return;

            const result = await response.json();
            const contacts = result.data || [];

            const container = document.getElementById("contactsContainer");

            if (contacts.length === 0) {
                container.innerHTML = `
      <p style="color: rgba(255,255,255,0.6); text-align:center; padding:2rem;">
        No messages found
      </p>`;
                return;
            }

            container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Message</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        ${contacts.map(c => `
          <tr>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.message}</td>
            <td>${new Date(c.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
        }

        // Show section
        function showSection(section, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

            document.getElementById(section).classList.add('active');
            el.classList.add('active');
            currentSection = section;
        }


        // Open modal
        function openModal(type, data = null) {
            document.getElementById('universalForm').reset();

            currentModal = type;
            editId = data ? data._id : null;

            const title = editId ? `Edit ${type.charAt(0).toUpperCase() + type.slice(1)} ` : `Add ${type.charAt(0).toUpperCase() + type.slice(1)} `;
            document.getElementById('modalTitle').textContent = title;

            let fields = '';

            switch (type) {

                case 'event':
                    fields = `
            <div class="form-group" >
                            <label>Title</label>
                            <input type="text" name="title" value="${data ? data.title : ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Short Description</label>
                            <input type="text" name="shortDescription" value="${data ? data.shortDescription : ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" required>${data ? data.description : ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" name="date" value="${data ? data.date.split('T')[0] : ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" name="location" value="${data ? data.location : ''}" required>
                        </div>
        `;
                    break;
                case 'notice':
                    fields = `
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" placeholder="General / Exam / Event" required>
        </div>
    `;
                    break;
                case 'gallery':
                    fields = `
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" required>
    </div>

    <div class="form-group">
      <label>Image URL</label>
      <input type="url" name="imageUrl" required>
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" required>
    </div>
  `;
                    break;



                case 'teacher':
                    fields = `
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" required>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" name="designation" placeholder="Professor / Lecturer" required>
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" placeholder="Short description about teacher" required></textarea>
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="text" name="image" placeholder="https://image-link" required>
        </div>
    `;
                    break;

            }

            document.getElementById('formFields').innerHTML = fields;
            document.getElementById('universalModal').classList.add('show');
        }

        // Close modal
        function closeModal() {
            document.getElementById('universalModal').classList.remove('show');
            document.getElementById('universalForm').reset();
            currentModal = null;
            editId = null;
        }

        // Edit event
        function editEvent(eventData) {
            openModal('event', eventData);
        }

        // Delete item
        async function deleteItem(type, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            let endpoint = '';
            switch (type) {
                case 'event': endpoint = '/api/events/'; break;
                case 'notice': endpoint = '/api/notice/'; break;
                case 'gallery': endpoint = '/api/gallery/'; break;
                case 'teacher': endpoint = '/api/teacher/'; break;
            }

            const response = await fetchWithAuth(endpoint + id, { method: 'DELETE' });

            if (response && response.ok) {
                showToast('Item deleted successfully');
                loadAllData();
            } else {
                showToast('Failed to delete item', true);
            }
        }

        // Handle form submit
        document.getElementById('universalForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());


            if (
                currentModal === 'notice' &&
                (!data.title || !data.description || !data.date || !data.category)
            ) {
                showToast('All notice fields are required', true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Save';
                return;
            }


            if (currentModal === 'gallery' && (!data.title || !data.imageUrl)) {
                showToast('Title and image URL are required', true);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Save';
                return;
            }

            let endpoint = '';
            let method = 'POST';

            switch (currentModal) {
                case 'event':
                    endpoint = editId ? `/api/events/${editId}` : '/api/events';
                    method = editId ? 'PUT' : 'POST';
                    break;
                case 'notice':
                    endpoint = '/api/notice';
                    break;
                case 'gallery':
                    endpoint = '/api/gallery';
                    break;
                case 'teacher':
                    endpoint = '/api/teacher';
                    break;
            }

            const response = await fetchWithAuth(endpoint, {
                method,
                body: JSON.stringify(data)
            });

            if (response && response.ok) {
                showToast('Saved successfully');
                closeModal();
                loadAllData();
            } else {
                showToast('Operation failed', true);
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save"></i> Save';
        });
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('authToken');
                window.location.href = 'login.html';
            }
        }


    </script>
</body>
