<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --dark: #1e1b4b;
            --light: #f8fafc;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 102, 241, 0.4);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 5rem 5% 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }

        /* Section Styles */
        .section {
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(102, 102, 241, 0.5);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #a5b4fc;
        }

        .card p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .card-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .card-meta i {
            color: var(--primary);
        }

        /* Notice Board */
        .notice-board {
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--secondary);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .notice-board h4 {
            color: #c4b5fd;
            margin-bottom: 0.5rem;
        }

        /* Footer */
        .footer {
            background: rgba(30, 27, 75, 0.95);
            padding: 2rem 5%;
            text-align: center;
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i> College Portal
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="authLink"></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to Our College</h1>
        <p>Excellence in Education, Innovation in Learning</p>
        <a href="events.html" class="btn-primary">Explore Events</a>
    </section>

    <!-- Latest Events -->
    <section class="section">
        <h2 class="section-title">Latest Events</h2>
        <div id="eventsContainer" class="card-grid">
            <div class="spinner"></div>
        </div>
    </section>

    <!-- Notices -->
    <section class="section">
        <h2 class="section-title">Recent Notices</h2>
        <div id="noticesContainer">
            <div class="spinner"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 College Management System. All rights reserved.</p>
    </footer>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const authLink = document.getElementById('authLink');

            if (token) {
                authLink.innerHTML = `
                    <a href="admin.html" class="btn-primary">Dashboard</a>
                `;
            } else {
                authLink.innerHTML = `
                    <a href="login.html" class="btn-primary">Login</a>
                `;
            }
        }

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Fetch latest events
        async function fetchEvents() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/events`);
                const result = await response.json();
                const events = result.data || [];

                const container = document.getElementById('eventsContainer');

                if (events.length === 0) {
                    container.innerHTML =
                        '<p style="text-align:center; color: rgba(255,255,255,0.5);">No events available</p>';
                    return;
                }

                container.innerHTML = events.slice(0, 3).map(event => `
            <div class="card">
                <h3>${event.title}</h3>
                <p>${event.shortDescription || event.description}</p>
                <div class="card-meta">
                    <span><i class="fas fa-calendar"></i> ${new Date(event.date).toLocaleDateString()}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
                </div>
            </div>
        `).join('');
            } catch (error) {
                console.error(error);
            }
        }


        // Fetch latest notices
        async function fetchNotices() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/notice`);
                const result = await response.json();
                const notices = result.data || [];

                const container = document.getElementById('noticesContainer');

                if (notices.length === 0) {
                    container.innerHTML =
                        '<p style="text-align:center; color: rgba(255,255,255,0.5);">No notices available</p>';
                    return;
                }

                container.innerHTML = notices.slice(0, 5).map(notice => `
            <div class="notice-board">
                <h4>${notice.title}</h4>
                <p style="color: rgba(255,255,255,0.7);">${notice.content}</p>
            </div>
        `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        // Initialize
        checkAuth();
        fetchEvents();
        fetchNotices();
    </script>
</body>

</html>
