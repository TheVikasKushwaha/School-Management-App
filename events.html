<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - College Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 102, 241, 0.4);
        }

        /* Page Header */
        .page-header {
            text-align: center;
            padding: 3rem 5% 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Admin Controls */
        .admin-controls {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 2rem;
        }

        .admin-controls.show {
            display: block;
        }

        /* Events Grid */
        .events-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(102, 102, 241, 0.5);
        }

        .event-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #a5b4fc;
        }

        .event-card .short-desc {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
        }

        .event-card .description {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .event-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            flex-wrap: wrap;
        }

        .event-meta i {
            color: #667eea;
        }

        .admin-actions {
            display: none;
            margin-top: 1rem;
            gap: 0.5rem;
        }

        .admin-actions.show {
            display: flex;
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: #a5b4fc;
        }

        .close-modal {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 102, 241, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Confirm Dialog */
        .confirm-dialog {
            background: rgba(30, 27, 75, 0.98);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 2rem;
            max-width: 400px;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-confirm,
        .btn-cancel {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-confirm {
            background: #ef4444;
            color: white;
        }

        .btn-confirm:hover {
            background: #dc2626;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.9);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i> College Portal
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="authLink"></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1><i class="fas fa-calendar-alt"></i> College Events</h1>
        <p style="color: rgba(255,255,255,0.6);">Discover upcoming events and activities</p>
    </div>

    <!-- Admin Controls -->
    <div class="admin-controls" id="adminControls">
        <button class="btn-primary" onclick="openCreateModal()">
            <i class="fas fa-plus"></i> Create Event
        </button>
    </div>

    <!-- Events Container -->
    <div class="events-container">
        <div class="events-grid" id="eventsGrid">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create Event</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" name="title" required placeholder="Annual Tech Fest 2024">
                </div>
                <div class="form-group">
                    <label for="shortDescription">Short Description</label>
                    <input type="text" id="shortDescription" name="shortDescription" required
                        placeholder="Brief overview of the event">
                </div>
                <div class="form-group">
                    <label for="description">Full Description</label>
                    <textarea id="description" name="description" required
                        placeholder="Detailed description of the event"></textarea>
                </div>
                <div class="form-group">
                    <label for="date">Event Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" required placeholder="Main Auditorium">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-save"></i> Save Event
                </button>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content confirm-dialog">
            <h2 style="color: #f87171; margin-bottom: 1rem;">
                <i class="fas fa-exclamation-triangle"></i> Confirm Delete
            </h2>
            <p style="color: rgba(255,255,255,0.8);">Are you sure you want to delete this event? This action cannot be
                undone.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let currentEditId = null;
        let deleteEventId = null;

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const authLink = document.getElementById('authLink');
            const adminControls = document.getElementById('adminControls');

            if (token) {
                authLink.innerHTML = '<a href="admin.html" class="btn-primary">Dashboard</a>';
                adminControls.classList.add('show');

                // Show admin actions on all cards
                document.querySelectorAll('.admin-actions').forEach(el => {
                    el.classList.add('show');
                });
            } else {
                authLink.innerHTML = '<a href="login.html" class="btn-primary">Login</a>';
            }
        }

        // Show toast
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Fetch events
        async function fetchEvents() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/events`);
                const result = await response.json();
                const events = result.data || [];

                const grid = document.getElementById('eventsGrid');
                const isAdmin = localStorage.getItem('authToken');

                if (events.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color: rgba(255,255,255,0.5); grid-column: 1/-1;">No events available</p>';
                    return;
                }

                grid.innerHTML = events.map(event => `
                    <div class="event-card">
                        <h3>${event.title}</h3>
                        <p class="short-desc">${event.shortDescription}</p>
                        <p class="description">${event.description}</p>
                        <div class="event-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(event.date).toLocaleDateString()}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${event.location}</span>
                        </div>
                        <div class="admin-actions ${isAdmin ? 'show' : ''}">
                            <button class="btn-edit" onclick="editEvent('${event._id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-delete" onclick="deleteEvent('${event._id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching events:', error);
                document.getElementById('eventsGrid').innerHTML =
                    '<p style="text-align:center; color: rgba(255,255,255,0.5); grid-column: 1/-1;">Failed to load events</p>';
            }
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Create Event';
            document.getElementById('eventForm').reset();
            currentEditId = null;
            document.getElementById('eventModal').classList.add('show');
        }

        // Edit event
        async function editEvent(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/events`);
                const result = await response.json();
                const events = result.data || [];

                const event = events.find(e => e._id === id);

                if (!event) {
                    showToast('Event not found', true);
                    return;
                }

                document.getElementById('modalTitle').textContent = 'Edit Event';
                document.getElementById('title').value = event.title;
                document.getElementById('shortDescription').value = event.shortDescription;
                document.getElementById('description').value = event.description;
                document.getElementById('date').value = event.date.split('T')[0];
                document.getElementById('location').value = event.location;

                currentEditId = id;
                document.getElementById('eventModal').classList.add('show');
            } catch (error) {
                console.error(error);
                showToast('Failed to load event', true);
            }
        }


        // Delete event
        function deleteEvent(id) {
            deleteEventId = id;
            document.getElementById('deleteModal').classList.add('show');
        }

        // Confirm delete
        async function confirmDelete() {
            const token = localStorage.getItem('authToken');

            try {
                const response = await fetch(`${API_BASE_URL}/api/events/${deleteEventId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    showToast('Event deleted successfully');
                    closeDeleteModal();
                    fetchEvents();
                } else {
                    showToast('Failed to delete event', true);
                }
            } catch (error) {
                console.error('Error deleting event:', error);
                showToast('Network error', true);
            }
        }

        // Close modals
        function closeModal() {
            document.getElementById('eventModal').classList.remove('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deleteEventId = null;
        }

        // Handle form submit
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('authToken');
            if (!token) {
                showToast('Please login first', true);
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            const formData = {
                title: document.getElementById('title').value,
                shortDescription: document.getElementById('shortDescription').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value,
                location: document.getElementById('location').value
            };

            try {
                const url = currentEditId
                    ? `${API_BASE_URL}/api/events/${currentEditId}`
                    : `${API_BASE_URL}/api/events`;

                const method = currentEditId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showToast(`Event ${currentEditId ? 'updated' : 'created'} successfully`);
                    closeModal();
                    fetchEvents();
                } else {
                    const data = await response.json();
                    showToast(data.message || 'Operation failed', true);
                }
            } catch (error) {
                console.error('Error saving event:', error);
                showToast('Network error', true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Event';
            }
        });

        // Close modal on outside click
        document.getElementById('eventModal').addEventListener('click', (e) => {
            if (e.target.id === 'eventModal') {
                closeModal();
            }
        });

        document.getElementById('deleteModal').addEventListener('click', (e) => {
            if (e.target.id === 'deleteModal') {
                closeDeleteModal();
            }
        });

        // Initialize
        checkAuth();
        fetchEvents();
    </script>
</body>

</html>
